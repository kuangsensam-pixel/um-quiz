<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {

    background: #f0f4f9;
    color: #1f1f1f;
    padding: 16px;

  }
  .header { text-align: center; padding: 16px 0; margin-bottom: 12px; }

  .header p { font-size: 13px; color: #5f6368; margin-top: 4px; }
  .audit-badge {
    display: inline-block; padding: 4px 12px; border-radius: 12px;

  }
  .filter-bar {

  }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #dadce0;

  }
  .filter-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }
  .filter-btn:hover { border-color: #1a73e8; }

  .progress-dot {

    cursor: pointer; transition: all 0.15s; border: 1px solid #ccc;
    flex-shrink: 0;
  }
  .progress-dot.answered { background: #1a73e8; color: white; border-color: #1a73e8; }

    .feedback.wrong { background: #3a1f1e; border-left-color: #ea4335; }
    .badge.module1 { background: #1a3c6b; color: #8ab4f8; }

    .badge.module3 { background: #1e3527; color: #81c995; }
    .badge.module4 { background: #3a2a1e; color: #fdd663; }
    .nav-btn.prev { background: #3c4043; color: #e3e3e3; }
    .nav-btn.prev:hover { background: #4a4d50; }
    .nav-btn.locked { background: #3c4043; color: #9aa0a6; }

    .random-btn { background: #2d2f31; border-color: #8ab4f8; color: #8ab4f8; }

提交報告、否則將影響年度考核。", "根據會議決定；各部門需於2025年3月15日前提交報告；否則將影響年度考核。", "根據會議決定．各部門需於2025年3月15日前提交報告．否則將影響年度考核。"], "answer": 0, "explanation": "中文公文分句之間應使用逗號，句末使用句號。選項B誤用頓號（用於並列詞彙之間），選項C誤用分號，選項D誤用句點。"}, {"module": 2, "question": "英文商業書信中，\"Dear Sir/Madam,\" 通常用於何種情況？", "options": ["寫信給關係密切的同事", "不知道收信人性別或姓名時", "寫信給直屬上司", "寫信給下屬時"], "answer": 1, "explanation": "\"Dear Sir/Madam\" 是不知道收信人姓名或性別時的標準正式稱呼。若知道姓名應使用 \"Dear Mr. / Ms. [Last Name]\"。"}, {"module": 2, "question": "以下哪個詞語最適合用於正式公文表示「因為」？", "options": ["因為", "由於", "都怪", "鑑於"], "answer": 3, "explanation": "「鑑於」是最正式的公文用語，表示考慮到某種情況。「由於」較中性，「因為」較口語，「都怪」完全不適合正式公文。"}, {"module": 2, "question": "以下哪個句子有文法錯誤？", "options": ["The report was submitted by the intern.", "Neither the manager nor his assistant were available for comment.", "Each of the employees has received the new guidelines.", "The committee has reached a unanimous decision."], "answer": 1, "explanation": "\"Neither... nor...\" 連接的主語應遵循就近原則：assistant 為單數，應使用 \"was\" 而非 \"were\"。正確寫法為 \"Neither the manager nor his assistant was available for comment.\""}, {"module": 2, "question": "公文寫作的「3C原則」不包括以下哪項？", "options": ["Clear（清晰）", "Concise（簡潔）", "Courteous（禮貌）", "Creative（創意）"], "answer": 3, "explanation": "公文寫作3C原則為 Clear（清晰）、Concise（簡潔）、Courteous（禮貌）。Creative 並非3C原則之一。"}, {"module": 2, "question": "正式通告中，若需列舉多項內容，應使用哪種格式？", "options": ["不分段連續書寫", "使用數字編號或項目符號逐項列出", "全部用粗體字標示", "使用表格但不加邊框"], "answer": 1, "explanation": "正式通告列舉多項內容時，應使用數字編號或項目符號逐項列出，便於閱讀和參照。連續書寫會造成混亂。"}, {"module": 2, "question": "以下哪個 Salutation 最適合用於寫給一位不認識的女性高層主管？", "options": ["Hey there!", "Dear Ms. Johnson,", "Hi Mrs. Johnson,", "To whom it may concern,"], "answer": 1, "explanation": "知道收信人姓名時，應使用 \"Dear Ms./Mr. [Last Name]\"。\"To whom it may concern\" 用於完全不知道收信人是誰的情況。"}, {"module": 2, "question": "以下哪句中文公文用語是正確的？", "options": ["如有任何疑問，請聯繫本人。", "如有任何疑問，請聯繫我。", "如有任何疑問，請洽詢本處。", "不懂的話就問我。"], "answer": 2, "explanation": "正式公文應使用「本處」、「本局」等機構自稱，結尾使用「洽詢」等正式詞語。「本人」在公文中略顯生硬，「請聯繫我」語氣偏向非正式。"}, {"module": 2, "question": "英文商業書信中，以下哪個 Closing 最正式？", "options": ["Yours faithfully,", "Best regards,", "Cheers,", "Thanks,"], "answer": 0, "explanation": "\"Yours faithfully\" 是最正式的書信結語，用於以 \"Dear Sir/Madam\" 開頭的信件。\"Yours sincerely\" 用於知道收信人姓名時。"}, {"module": 2, "question": "以下句子中，哪個詞彙選擇最不恰當？「本公司____推出全新員工福利計劃。」", "options": ["擬於", "將於", "打算於", "謹訂於"], "answer": 2, "explanation": "「打算於」語氣口語化且不確定性強，不適合用於正式公文。「擬於」和「謹訂於」皆為正式用語，「將於」較中性。"}, {"module": 2, "question": "以下哪項是正確的邀請函開頭？", "options": ["Hey, you're invited to our party!", "We are pleased to invite you to the Annual Staff Dinner...", "Come to our event, it'll be fun!", "This is an invitation."], "answer": 1, "explanation": "正式邀請函應使用 \"We are pleased to invite you / We cordially invite you\" 等正式用語開頭。口語化的邀請不適合用於行政公文。"}, {"module": 2, "question": "以下句子中哪個標點符號使用正確？", "options": ["會議將討論：預算分配、人員調動、以及年度目標。", "會議將討論預算分配、人員調動及年度目標。", "會議將討論，預算分配，人員調動，以及年度目標。", "會議將討論「預算分配」「人員調動」「年度目標」。"], "answer": 1, "explanation": "「討論」之後不應使用冒號，及物動詞直接帶賓語。並列詞彙之間使用頓號，最後一項前使用「及」或「與」即可。"}, {"module": 2, "question": "Which of the following sentences is grammatically correct?", "options": ["The team are working on the project.", "The data shows that sales has increased.", "The criteria for selection has been revised.", "The phenomenon is well-documented in the literature."], "answer": 3, "explanation": "\"Phenomenon\" 是單數名詞（複數為 phenomena），搭配單數動詞 \"is\" 正確。選項A文法無誤（集合名詞可接複數動詞），但選項B \"data\" 應接 \"show\"，\"sales\" 應接 \"have\"；選項C \"criteria\" 為複數應接 \"have\"。最佳答案為D。"}, {"module": 2, "question": "以下哪句是正確的英文 Memo 結尾？", "options": ["Let's discuss this soon!", "Please review the attached document and provide feedback by 5 March 2025.", "That's all, thanks!", "Talk later."], "answer": 1, "explanation": "Memo 結尾應清楚說明所需行動和時限。選項B明確要求審閱文件並在指定日期前回覆，是最清晰的寫法。"}, {"module": 2, "question": "中文公文中，日期書寫格式何者正確？", "options": ["2025年3月1日", "2025年03月01日", "2025/3/1", "2025-03-01"], "answer": 0, "explanation": "中文正式公文日期應使用「民國或西元年＋月＋日」的全稱格式，不加前導零，不使用斜線或連字符。2025年3月1日為標準寫法。"}, {"module": 2, "question": "以下公文用語中，哪個最適合表達「要求對方做某事」？", "options": ["請你務必", "請貴單位協助辦理", "你最好", "你一定要"], "answer": 1, "explanation": "「請貴單位協助辦理」語氣正式且禮貌，使用敬稱「貴」字，適合正式公文。其他選項帶有命令或威脅語氣，不適合公文。"}, {"module": 2, "question": "在英文書信中，若以 \"Dear Mr. Chen,\" 開頭，結尾應使用？", "options": ["Yours faithfully,", "Yours sincerely,", "Best,", "Sincerely yours,"], "answer": 1, "explanation": "若知道收信人姓名（Dear Mr. Chen），結尾應使用 \"Yours sincerely\"。\"Yours faithfully\" 用於不知道收信人姓名（Dear Sir/Madam）的情況。"}, {"module": 2, "question": "以下哪句中的頓號使用正確？", "options": ["採購項目包括：電腦、打印機、及文具用品。", "會議出席者為張經理、李主任、和王副總。", "請各部門提交年度預算、工作計劃、及績效報告。", "請各部門提交年度預算、工作計劃及績效報告。"], "answer": 3, "explanation": "中文中並列項最後一項前不應加頓號，使用「及」或「與」連接即可。「A、B及C」為規範寫法，不加頓號在「及」之前。"}, {"module": 2, "question": "以下哪句表達最符合正式公文語氣？", "options": ["This is to notify all staff that the office will be closed on 1 May.", "Just a heads up - the office will be closed on 1 May.", "FYI, office closed May 1st.", "Don't forget the office is closed on May Day."], "answer": 0, "explanation": "\"This is to notify all staff that...\" 是標準的正式通知開頭。選項 B、C、D 皆使用口語化或簡化表達，不適合正式公文。"}, {"module": 2, "question": "以下哪個選項中的公文用語最得體？", "options": ["收信者：你們好", "尊敬的各位同仁：", "嗨，大家好", "致各位同事們"], "answer": 1, "explanation": "行政公文稱呼應用「尊敬的各位同仁」或「各位同仁：」等正式用語。「你們好」口語化，「嗨」完全不正式，「致各位同事們」語法略顯生硬。"}, {"module": 2, "question": "\"Please find attached...\" 一句中，何時使用最恰當？", "options": ["在信件正文中提示對方查看附件", "在信件主題行中", "在信件結尾簽名之後", "只在第一次發郵件時使用"], "answer": 0, "explanation": "\"Please find attached...\" 是商業書信中提示附件的標準用語，應放在信件正文中，例如 \"Please find attached the quarterly report.\""}, {"module": 2, "question": "以下句子中「關於」一詞的位置何者正確？", "options": ["關於本年度預算案，各部門請於限期前提出意見。", "本年度預算案關於，各部門請於限期前提出意見。", "各部門關於本年度預算案，請於限期前提出意見。", "各部門請於限期前提出意見，關於本年度預算案。"], "answer": 0, "explanation": "「關於」應放在句首，引出主題或事由，後面接逗號。其他選項的語序不符合中文公文習慣。"}, {"module": 2, "question": "以下哪項是行政公文「主旨」應包含的內容？", "options": ["詳細的實施步驟", "背景說明和引用法規", "簡要說明發文目的或主題", "完整的聯絡方式"], "answer": 2, "explanation": "主旨（Subject）應簡要說明本公文的目的或主題，讓收文者一眼看出公文重點。詳細步驟和背景說明應放在說明段。"}, {"module": 2, "question": "Which sentence uses the correct formal tone for a complaint letter?", "options": ["This is the third time I'm writing about this mess - get it sorted!", "I am writing to express my dissatisfaction with the service I received on 15 March.", "Your service was really bad and I'm not happy about it.", "You guys need to fix this ASAP."], "answer": 1, "explanation": "正式投訴信應使用客觀、禮貌但堅定的語氣。選項1表明寫信目的和具體情況，措辭正式得體。其他選項語氣情緒化或口語化。"}, {"module": 2, "question": "以下哪句的關聯詞使用正確？", "options": ["不但各部門需提交報告，而且需附上數據。", "各部門不但需提交報告，而且需附上數據。", "不但各部門需提交報告，而且並需附上數據。", "不單各部門需提交報告，而且還需附上數據。"], "answer": 1, "explanation": "「不但……而且……」用於同一主語時，主語應放在「不但」之前。正確結構為「主語＋不但……而且……」。選項A主語位置錯誤，C和D有冗詞。"}, {"module": 2, "question": "以下哪個是正確的英文信件主題行（Subject Line）格式？", "options": ["Meeting Schedule", "RE: Meeting Schedule", "Subject: Meeting Schedule", "Meeting Schedule - Important"], "answer": 0, "explanation": "信件主題行應簡潔明確直接說明主題，不需要加 \"Subject:\" 前綴或 \"RE:\"（回覆時自動產生）。\"Meeting Schedule\" 簡潔明瞭。"}, {"module": 2, "question": "中文公文中，若提及「附件」應如何表述？", "options": ["請見附件。", "詳如附件。", "附件有：", "請參見後面附件。"], "answer": 1, "explanation": "正式公文提及附件時，標準用語為「詳如附件」。其他選項口語化或不夠正式。"}, {"module": 2, "question": "以下哪句英文有文法錯誤？", "options": ["The number of employees who have completed the training is increasing.", "A number of issues has been raised during the meeting.", "There are a number of options available.", "The number of complaints has decreased significantly."], "answer": 1, "explanation": "\"A number of\" 意為「許多」，後面應接複數名詞和複數動詞。正確為 \"A number of issues have been raised\"。\"The number of\" 則接單數動詞。"}, {"module": 2, "question": "以下哪個公文用語表示「經由上級批准後」的意思最恰當？", "options": ["經上級同意後", "等上面說好後", "奉上級核示", "經過上級OK後"], "answer": 2, "explanation": "「奉上級核示」為正式公文用語，其中的「奉」表示恭敬地接受上級指示，「核示」是審核批示。其他選項口語化或英文化。"}, {"module": 2, "question": "英文書信中，\"I look forward to hearing from you.\" 屬於哪個部分？", "options": ["Subject Line", "Salutation", "Closing Sentence", "Signature Block"], "answer": 2, "explanation": "此句是信件結尾的標準用語（Closing Sentence），放在正文最後、署名之前，表達期待對方回覆之意。"}, {"module": 2, "question": "以下哪句中文公文使用了正確的「被動句式」？", "options": ["這個決定被董事會批准了。", "本方案業經董事會核准在案。", "董事會已經把這個方案批准了。", "這個方案被董事會所批准。"], "answer": 1, "explanation": "中文公文不使用「被」字句，而用「經」、「業經」、「蒙」、「奉」等字表達被動意義。選項B「業經董事會核准在案」是最標準的公文被動表達。"}, {"module": 2, "question": "以下哪個句子符合「清楚（Clear）」原則？", "options": ["請盡快處理相關事宜。", "請於2025年3月15日（星期五）下午5時前，將簽核後的預算表交至財務處張小姐。", "把這個弄好交過去。", "請處理一下。"], "answer": 1, "explanation": "Clear 原則要求公文內容具體明確，包含時間、人物、事項等細節。選項B明確指出了截止日期、時間、交付對象和具體文件，是最清晰的寫法。"}, {"module": 2, "question": "以下哪項不是正式英文公文中應避免的？", "options": ["Contractions（縮寫如 don't, can't）", "Passive voice（被動語態）", "Clear subject lines", "Informal vocabulary"], "answer": 2, "explanation": "Clear subject lines（清晰的主題行）是正式公文應該使用的。縮寫、非正式詞彙應避免使用；被動語態在公文中雖然經常使用但不宜過多。"}, {"module": 2, "question": "以下哪句的引號使用正確？", "options": ["會議決議通過「員工績效考核辦法。」", "會議決議通過《員工績效考核辦法》。", "會議決議通過「員工績效考核辦法」。", "「會議決議通過員工績效考核辦法。」"], "answer": 1, "explanation": "法規、辦法、條例等正式文件名稱應使用書名號《》。句號應放在書名號之後。選項B格式正確。"}, {"module": 2, "question": "以下哪個英文表達最適合用於正式信件的開場白？", "options": ["I'm writing to tell you about...", "With reference to your letter dated 20 February 2025...", "So, about your letter...", "This is regarding your letter from last month."], "answer": 1, "explanation": "\"With reference to / Further to your letter dated...\" 是書信回覆的標準正式開場白，明確指出所參照的文書日期，語氣正式。"}, {"module": 2, "question": "以下哪個詞語最適合正式公文表示「安排」的意思？", "options": ["搞定", "辦理", "處理", "安排妥當"], "answer": 1, "explanation": "「辦理」是正式公文用語，意為處理、執行。「搞定」口語化，「處理」較中性，「安排妥當」可以在公文中使用但不如「辦理」簡潔。"}, {"module": 2, "question": "\"Please do not hesitate to contact me\" 一句中，\"do not hesitate\" 的作用是？", "options": ["表示對方正在猶豫", "強調歡迎隨時聯繫的語氣", "暗示不要打擾我", "表示時間緊迫"], "answer": 1, "explanation": "\"Please do not hesitate to...\" 是商務書信中的禮貌用語，意思是「請隨時……」，強調歡迎對方主動聯繫，並非字面上的「不要猶豫」。"}, {"module": 2, "question": "以下哪個公文標題最合適？", "options": ["關於調整上班時間的通知", "通知：上班時間要改", "公告：改時間", "Important Notice"], "answer": 0, "explanation": "中文公文標題應使用「關於……的通知／公告／函」的標準格式，清楚說明事由和文種。選項0最完整且正式。"}, {"module": 2, "question": "以下句子中，哪個「和」字使用不恰當？", "options": ["請各部門主管和全體員工出席會議。", "本次培訓將涵蓋溝通技巧和時間管理。", "請你和張經理討論後回覆我。", "本公司生產和銷售電子產品。"], "answer": 2, "explanation": "正式公文中提及第三人時應使用「與」或「跟」而非「和」。正確寫法為「請你與張經理討論後回覆本人」或「請你與張經理討論後回覆我處」。"}, {"module": 2, "question": "以下哪個英文句子符合「簡潔（Concise）」原則？", "options": ["Due to the fact that the meeting was cancelled, we will reschedule.", "Because the meeting was cancelled, we will reschedule it.", "Owing to the circumstance that the meeting was cancelled, we are going to reschedule the same at a later date.", "In view of the cancellation of the meeting, we will be scheduling a new one at some point in the future."], "answer": 1, "explanation": "Concise 原則要求使用最少的詞語表達清楚的意思。選項B \"Because the meeting was cancelled...\" 最簡潔，避免冗詞贅句如 \"Due to the fact that\"、\"at a later date\" 等。"}, {"module": 2, "question": "以下哪項是正確的公文「正本」與「副本」用語？", "options": ["正本：人事處；副本：會計處", "主要：人事處；次要：會計處", "給：人事處；抄送：會計處", "正本送：人事處；副本送：會計處"], "answer": 0, "explanation": "標準公文格式中，用「正本：」標示主要收文單位，用「副本：」標示副知單位，名稱後用冒號。選項A格式正確。"}, {"module": 2, "question": "以下哪句英文句子存在懸垂修飾（Dangling Modifier）錯誤？", "options": ["After reviewing the report, several errors were found.", "After reviewing the report, I found several errors.", "Having reviewed the report, the manager approved it.", "Walking to the office, I saw the new building."], "answer": 0, "explanation": "選項A \"After reviewing the report\" 的分詞主語應是執行動作的人，但句子主語為 \"several errors\"（錯誤不能審閱報告），造成懸垂修飾。應改為 \"After reviewing the report, I found...\""}, {"module": 2, "question": "中文公文中，「案由」一詞通常用於何處？", "options": ["公文結尾", "公文主旨開頭", "附件說明", "發文日期之後"], "answer": 1, "explanation": "「案由」通常用於公文主旨（主旨段）的開頭，簡要說明本公文的事由，例如「案由：為加強員工培訓……」。"}, {"module": 2, "question": "以下哪個英文表達最適合用於提醒對方截止日期？", "options": ["Please be reminded that the deadline for submission is 15 March 2025.", "Don't forget the deadline!", "You have to submit by March 15.", "Submission deadline is coming up, just so you know."], "answer": 0, "explanation": "\"Please be reminded that...\" 是正式提醒的標準用語，語氣禮貌且明確。其他選項語氣過於直接或口語化，不適合正式公文。"}, {"module": 2, "question": "以下句子中，何者使用了正確的英文分號？", "options": ["We visited three cities; Paris; London; and Rome.", "The meeting has been postponed; therefore, we will inform you of the new date.", "Please bring; your ID, passport, and visa.", "The report is due Friday; because the deadline is approaching."], "answer": 1, "explanation": "分號用於連接兩個相關的獨立子句，且第二句以連接副詞（therefore, however, moreover）開頭時，分號放在連接副詞之前。選項B用法正確。"}, {"module": 2, "question": "以下哪個不是行政公文中常見的英文書信種類？", "options": ["Memorandum (Memo)", "Minutes of Meeting", "Newsletter", "Circular"], "answer": 2, "explanation": "Memo、會議記錄（Minutes of Meeting）和通告（Circular）都是標準的行政公文。Newsletter（通訊／電子報）屬於宣傳出版品，不屬行政公文範疇。"}, {"module": 2, "question": "以下哪句的中文公文用語最為禮貌得體？", "options": ["你必須在限期前提交。", "請於限期前惠復為荷。", "快點交上來。", "記得要交喔！"], "answer": 1, "explanation": "「請於限期前惠復為荷」是標準的正式公文用語，「惠復」為敬詞表示對方回覆，「為荷」表示感激。語氣最為禮貌得體。"}, {"module": 2, "question": "以下哪個句子的「which」使用正確？", "options": ["The report which you submitted it yesterday is missing.", "The report which you submitted yesterday is missing.", "The report which you submitted it, is missing.", "The report, which you submitted yesterday, is missing."], "answer": 1, "explanation": "關係代名詞 \"which\" 在從句中作受詞時，不應再重複受詞（it）。選項A有重複受詞錯誤。選項D用逗號分隔為非限定用法，文法亦正確但語意略有不同。選項B最簡潔且正確。"}, {"module": 2, "question": "以下哪句中文公文使用了正確的「函」的格式開頭？", "options": ["你好：", "敬啟者：", "主旨：", "一、"], "answer": 2, "explanation": "正式「函」的格式以「主旨：」開頭，接續說明段。「敬啟者」是書信而非公文的開頭。公文函有固定格式（主旨、說明、辦法）。"}, {"module": 2, "question": "以下哪個英文句子有主謂不一致（Subject-Verb Agreement）錯誤？", "options": ["The team have completed their individual reports.", "The committee has made its decision.", "Everyone in the department is expected to attend.", "Either the director or his assistants are responsible."], "answer": 0, "explanation": "若將 team 視為集合名詞指整體，應接單數動詞 \"has completed\"。\"Everyone\"、\"Either...or\"（就近原則）的用法正確。選項A在英式英語中可接受，但在正式行政文書中建議統一使用單數。"}, {"module": 2, "question": "以下哪一項是對公文「附件」的正確處理方式？", "options": ["在正文結尾寫「附件：如文」", "正文中重複附件內容", "附件不需要在正文中提及", "在簽名下方列出附件清單"], "answer": 0, "explanation": "公文如有附件，應在正文結尾處標註「附件：如文」或「附件：如主旨」等用語，或在說明段後列出附件名稱。"}, {"module": 2, "question": "以下哪句英文最符合公文「禮貌（Courteous）」原則？", "options": ["You made a mistake in the report.", "It appears that there may be an error in the report that requires correction.", "Fix the mistake in your report.", "Your report is wrong."], "answer": 1, "explanation": "Courteous 原則要求用詞委婉禮貌，即使是指出錯誤。選項B使用 \"It appears that there may be...\" 的委婉語氣，並提出解決方案 \"requires correction\"，最為得體。"}, {"module": 2, "question": "中文公文中，「茲」字表達的意思是？", "options": ["現在 / 在此", "將來", "過去", "可能"], "answer": 0, "explanation": "「茲」是公文常用詞，意為「現在」或「在此」，如「茲函達」、「茲檢送」、「茲通知」等，表示正在進行的動作。"}, {"module": 2, "question": "以下哪個選項正確使用了英文逗號？", "options": ["After the meeting we went to lunch.", "After the meeting, we went to lunch.", "After, the meeting we went to lunch.", "After the meeting we, went to lunch."], "answer": 1, "explanation": "句首的副詞子句或片語後需要加逗號與主句分隔。\"After the meeting\" 為句首副詞片語，其後應加逗號。"}, {"module": 2, "question": "以下哪個公文用語中的「函」字使用正確？", "options": ["來函收悉", "去函詢問", "函覆如後", "以上皆可"], "answer": 3, "explanation": "以上皆是正確的公文用語。「來函」指收到的公文，「去函」指發出的公文，「函覆」指以公文回覆。這些都是行政公文中的標準用法。"}, {"module": 2, "question": "以下哪句英文商業書信用語不恰當？", "options": ["We acknowledge receipt of your letter dated 10 March 2025.", "We are writing to confirm the following arrangement.", "We would like to inform you that the meeting has been rescheduled.", "We wanna let you know about the meeting change."], "answer": 3, "explanation": "\"Wanna\" 是 \"want to\" 的口語縮寫，完全不適合用於正式書信。正式信件應使用完整的 \"We would like to inform you\" 等用語。"}, {"module": 2, "question": "以下句子中，哪個使用了正確的冒號？", "options": ["Please bring: your laptop and notebook.", "The agenda includes: budget review, project update, and Q&A.", "Please ensure you have the following items: a valid ID, your badge, and a mask.", "會議內容有：一、報告事項，二、討論事項，三、臨時動議。"], "answer": 2, "explanation": "冒號應用於引出列表或說明，且前面應是一個完整的句子。選項C \"Please ensure you have the following items:\" 是完整句子，冒號引出列表，用法正確。"}, {"module": 2, "question": "以下哪一個是正式的英文信件「署名區（Signature Block）」應包含的內容？", "options": ["Name only", "Name, Title, Department, and Contact Information", "First name only", "Nickname and phone number"], "answer": 1, "explanation": "正式的英文書信署名區應包含全名、職稱、部門和聯絡方式（電話、電郵等），便於對方識別發文者身份和後續聯絡。"}, {"module": 2, "question": "以下哪句公文用語中的「業」字使用正確？", "options": ["本案業已處理完畢。", "業於今日提交報告。", "已業完成辦理。", "業經上級核准。"], "answer": 3, "explanation": "「業經」為標準公文用語，意為「已經經過」。「業已」雖然也常見但較口語化。「業」不應單獨使用或與其他字搭配不當。"}, {"module": 2, "question": "以下哪句英文使用了正確的倒裝句？", "options": ["Not only the manager approved the plan, but also the team.", "Not only did the manager approve the plan, but also the team supported it.", "Only after the meeting we realized the problem.", "Hardly we finished the report when the deadline passed."], "answer": 1, "explanation": "\"Not only\" 置於句首時，後面子句需使用倒裝結構 \"did + 主詞 + 原形動詞\"。選項B倒裝正確。選項C和D缺少倒裝。"}, {"module": 2, "question": "以下哪項關於公文「說明段」的寫法正確？", "options": ["說明：一、依據……辦理。二、……", "說明→1.……2.……", "Explanation: ...", "說明：首先……其次……最後……"], "answer": 0, "explanation": "公文說明段標準格式為：「說明：」後接一、二、三……等數字序號，逐項說明。選項A完全符合標準格式。"}, {"module": 2, "question": "以下哪個句子中的 \"its\" 使用正確？", "options": ["The company has updated their policy on it's website.", "The company has updated its policy on its website.", "The company has updated it's policy on its website.", "The company has updated their policy on its' website."], "answer": 1, "explanation": "\"Its\" 是 it 的所有格（「它的」），\"it's\" 是 \"it is\" 或 \"it has\" 的縮寫。表示「公司的政策」和「它的網站」都應使用所有格 \"its\"。"}, {"module": 2, "question": "以下哪個英文動詞最適合用於正式公文表示「要求」？", "options": ["Ask", "Request", "Want", "Demand"], "answer": 1, "explanation": "\"Request\" 是最適合正式公文的詞，語氣禮貌且正式。\"Ask\" 較口語化，\"Want\" 語氣過於直接，\"Demand\" 語氣強硬不適合一般公文。"}, {"module": 2, "question": "以下哪句使用了正確的破折號？", "options": ["會議延期至-2025年4月1日-舉行。", "會議延期至——2025年4月1日——舉行。", "會議延期至2025年4月1日舉行", "會議延期至─2025年4月1日─舉行。"], "answer": 1, "explanation": "中文公文中需要強調或插入說明時，應使用兩個相連的破折號「——」（或 em dash）。選項B使用正確的中文破折號格式。"}, {"module": 2, "question": "以下哪句公文用語中的「據」字使用正確？", "options": ["據了解，該計劃已獲批准。", "據上級指示辦理。", "據統計，今年業績成長15%。", "以上皆是。"], "answer": 3, "explanation": "「據」在公文中常見用法包括「據了解」（根據了解）、「據上級指示」（根據上級指示）、「據統計」（根據統計數據），以上皆為正確用法。"}, {"module": 2, "question": "以下哪句英文使用了正確的比較級結構？", "options": ["This proposal is more better than the previous one.", "This proposal is better than the previous one.", "This proposal is more good than the previous one.", "This proposal is gooder than the previous one."], "answer": 1, "explanation": "\"Good\" 的比較級為 \"better\"，不應再加 \"more\"。選項B \"This proposal is better than the previous one\" 是正確的比較級用法。"}, {"module": 2, "question": "中文公文中，若需表達「隨信附上」應使用哪個詞語？", "options": ["隨信附上", "附上", "檢送", "夾帶"], "answer": 2, "explanation": "「檢送」是最正式的公文用語，如「檢送年度報告一份」。「隨信附上」偏向書信用語，「附上」較中性，「夾帶」非公文用語。"}, {"module": 2, "question": "以下哪個選項的英文書信結構順序正確？", "options": ["Salutation → Body → Closing → Signature → Subject Line", "Subject Line → Salutation → Body → Closing → Signature", "Signature → Subject Line → Salutation → Body → Closing", "Body → Salutation → Subject Line → Closing → Signature"], "answer": 1, "explanation": "標準英文商業書信的結構順序為：Subject Line（主旨）→ Salutation（稱呼）→ Body（正文）→ Closing（結語）→ Signature（署名）。"}, {"module": 2, "question": "以下哪句中文公文使用了正確的「為」字句？", "options": ["為配合政府節能政策，本公司將調整辦公時間。", "為的是要配合政策，所以調整時間。", "為了配合政策啦，所以要改時間。", "為配合政府節能政策之需要，爰調整辦公時間。"], "answer": 3, "explanation": "正式公文「為」字句應配合使用「之」、「爰」（於是）等文言語彙。選項D「為配合……之需要，爰……」是標準的正式公文用語。選項A也可接受但略欠正式。"}, {"module": 2, "question": "以下哪個英文句子有文法錯誤？", "options": ["I look forward to meet you at the conference.", "I look forward to meeting you at the conference.", "We look forward to your reply.", "She looks forward to hearing from the committee."], "answer": 0, "explanation": "\"Look forward to\" 中的 \"to\" 是介詞，後面應接名詞或動名詞（V-ing）。正確為 \"I look forward to meeting you\"，\"I look forward to your reply\" 也是正確的（your reply 是名詞）。"}, {"module": 2, "question": "以下哪項是行政公文中的「辦法段」應包含的內容？", "options": ["背景說明", "具體執行方式和步驟", "發文日期", "附件清單"], "answer": 1, "explanation": "公文「辦法段」是說明應該如何執行、具體的步驟和方式，是實踐層面的內容。背景說明應在「說明段」。"}, {"module": 2, "question": "以下哪句英文使用了正確的平行結構（Parallelism）？", "options": ["The intern is responsible for filing, to answer calls, and data entry.", "The intern is responsible for filing, answering calls, and entering data.", "The intern is responsible for filing, to answer calls, and entering data.", "The intern is responsible to file, answering calls, and data entry."], "answer": 1, "explanation": "平行結構要求並列項目的語法形式一致。選項B的三項皆為動名詞（filing, answering, entering），結構平行正確。"}, {"module": 2, "question": "以下哪個中文公文用語表示「回覆」最恰當？", "options": ["回信", "答覆", "函復", "回話"], "answer": 2, "explanation": "「函復」是最正式的公文用語，意為以公文形式回覆。「答覆」較中性可接受，「回信」偏向一般書信，「回話」口語化。"}, {"module": 2, "question": "以下哪種情況應使用 \"Cc\"（副本抄送）功能？", "options": ["給主要收件人的額外備註", "讓相關人員知悉但不需採取行動", "給主要收件人的取代方案", "回覆所有人時"], "answer": 1, "explanation": "Cc（Carbon Copy，副本抄送）用於將郵件發送給需要知悉內容但不需要直接採取行動或回覆的相關人員。"}, {"module": 2, "question": "以下哪句中文公文使用「敬請」一詞正確？", "options": ["敬請各部門配合辦理。", "敬請你來參加會議。", "敬請大家出席。", "敬請幫助。"], "answer": 0, "explanation": "「敬請」為正式敬詞，應用於正式場合。「敬請各部門配合辦理」語氣正式且對象恰當。其他選項的搭配較為口語或不正式。"}, {"module": 2, "question": "以下哪個英文句子使用 \"regarding\" 最恰當？", "options": ["Regarding your inquiry, we have processed your application.", "Regarding, we will get back to you.", "The meeting regarding.", "Regard your email, we have noted the details."], "answer": 0, "explanation": "\"Regarding\" 為介詞，意為「關於」，後面應接名詞片語，通常放在句首或句中。選項A \"Regarding your inquiry\" 用法正確。"}, {"module": 2, "question": "以下哪句的書名號使用正確？", "options": ["會議通過了《員工手冊》修訂案。", "會議通過了「員工手冊」修訂案。", "會議通過了<員工手冊>修訂案。", "會議通過了(員工手冊)修訂案。"], "answer": 0, "explanation": "正式文件名稱、法規、著作等應使用書名號《》。引號「」用於引用語句，尖括號和括號皆不適合用於文件名稱。"}, {"module": 2, "question": "以下哪句英文使用了正確的「條件事句」結構？", "options": ["If you will complete the report, please submit it by Friday.", "If you complete the report, please submit it by Friday.", "If you would complete the report, please submit it by Friday.", "If you completed the report, please submit it by Friday."], "answer": 1, "explanation": "在表示真實條件（real condition）的 if 子句中，應使用現在式動詞，即使指的是未來時間。選項B \"If you complete...please submit\" 為正確的第一條件句結構。"}, {"module": 3, "question": "請選出「產學研合作」最恰當的英文翻譯：", "options": ["Industry-University-Research Collaboration", "Production-Education-Research Cooperation", "Industrial-Academic-Research Partnership", "Industry-Academy-Research Collaboration"], "answer": 2, "explanation": "「產學研合作」的標準英文翻譯為「Industrial-Academic-Research Partnership」，其中industry指產業界，academy指學術界，research指研究機構。"}, {"module": 3, "question": "What is the best Chinese translation for \"cross-departmental communication\"?", "options": ["跨國溝通", "跨部門溝通", "跨文化溝通", "跨領域溝通"], "answer": 1, "explanation": "「Cross-departmental」意為跨部門的，「communication」為溝通，因此正確翻譯為「跨部門溝通」。"}, {"module": 3, "question": "「跨境學術交流」的英文翻譯最適當的是：", "options": ["Cross-border Academic Communication", "International Academic Exchange", "Cross-border Academic Exchange", "Transnational Scholarly Exchange"], "answer": 2, "explanation": "「跨境學術交流」標準譯法為「Cross-border Academic Exchange」，其中cross-border對應跨境，academic exchange對應學術交流。"}, {"module": 3, "question": "Which of the following is the best translation for「行政程序」?", "options": ["Administrative Process", "Administrative Procedure", "Executive Procedure", "Management Process"], "answer": 1, "explanation": "「行政程序」在行政學及法律領域中的標準術語為「Administrative Procedure」。"}, {"module": 3, "question": "「預算規劃」最恰當的英文是：", "options": ["Budget Planning", "Financial Forecasting", "Budgeting Plan", "Fiscal Arrangement"], "answer": 0, "explanation": "「預算規劃」的直接對應為「Budget Planning」，其中budget為預算，planning為規劃。"}, {"module": 3, "question": "What does「多元化」mean in English?", "options": ["Diversification", "Diversity", "Variety", "Pluralism"], "answer": 1, "explanation": "「多元化」作為形容多樣性、多元並存的狀態時，最常翻譯為「Diversity」；Diversification更強調分散風險的動作。"}, {"module": 3, "question": "「國際化」的正確英文翻譯是：", "options": ["Internationalization", "Globalization", "Internation ion": "「於...前提交」最精確的翻譯為「on or before…」表示包含該日期當天；by也可以但on or before更嚴謹。"}, {"module": 3, "question": "「恕不退費」的恰當英文翻譯是：", "options": ["No refund.", "Fees are non-refundable.", "Refund is not allowed.", "No money back."], "answer": 1, "explanation": "正式行政公告中「恕不退費」應譯為「Fees are non-refundable」，語氣正式且規範。"}, {"module": 3, "question": "Which is the MOST appropriate translation for「敬請準時出席」?", "options": ["Please be on time.", "Your punctual attendance is appreciated.", "Please attend on time.", "Don't be late."], "answer": 1, "explanation": "「敬請準時出席」是正式敬語，英文應反映正式語氣，「Your punctual attendance is appreciated」最合適。"}, {"module": 3, "question": "「特此通知」在英文公告中的常用對應是：", "options": ["We hereby notify you.", "This is to inform you.", "Please be advised that.", "All of the above are acceptable."], "answer": 3, "explanation": "「特此通知」有多種正式英文表達方式，We hereby notify、This is to inform、Please be advised that 皆可使用。"}, {"module": 3, "question": "「本澳」在英文翻譯中最適合的是：", "options": ["This city", "Local Macau", "Macau", "The present Macau"], "answer": 2, "explanation": "行政文書中的「本澳」應譯為「Local Macau」或「in Macau」，強調本地區。"}, {"module": 3, "question": "The phrase「敬希垂注」is best translated as:", "options": ["We hope you will pay attention.", "Your kind attention is drawn to.", "Please notice.", "We kindly ask for your attention."], "answer": 1, "explanation": "「敬希垂注」是非常正式的祈請用語，英文對應為「Your kind attention is drawn to...」，保留正式語氣。"}, {"module": 3, "question": "「茲因」在正式英文書函中的對應最可能是：", "options": ["Because", "Due to the fact that", "Whereas", "Since"], "answer": 2, "explanation": "「茲因」是法律或正式公文用語，英文對應為「Whereas」，用於引出背景或原因。"}, {"module": 3, "question": "Which of these translations for「跟進」is most appropriate in a meeting context?", "options": ["Follow up", "Follow-up", "Follow up on", "To follow"], "answer": 1, "explanation": "在會議紀要中作名詞使用的「跟進事項」，應寫作「Follow-up」，中間有連字號。"}, {"module": 3, "question": "「行政助理」的英文職稱是：", "options": ["Administrative Assistant", "Administration Assistant", "Admin Assistant", "Executive Assistant"], "answer": 0, "explanation": "「行政助理」的標準英文為「Administrative Assistant」；Executive Assistant通常指高階主管助理。"}, {"module": 3, "question": "What is the difference between「assure」and「ensure」?", "options": ["They are synonyms with no difference.", "Assure is for people, ensure is for events.", "Assure is physical, ensure is abstract.", "Assure means to promise, ensure means to guarantee."], "answer": 1, "explanation": "Assure用於向人保證以消除疑慮，Ensure用於確保某事發生，是典型的易混淆詞。"}, {"module": 3, "question": "Which preposition is CORRECT?「We will discuss the matter ___ the meeting.」", "options": ["in", "on", "at", "during"], "answer": 2, "explanation": "「在會議中」固定介詞為「at the meeting」，注意用at而非in。"}, {"module": 3, "question": "The phrase「as per」in「As per your request」is best considered:", "options": ["Colloquial", "Informal", "Formal/administrative", "Archaic"], "answer": 2, "explanation": "「As per」是行政和商務書信中常見的正式用語，意為「根據」。"}, {"module": 3, "question": "「你方」在商務/行政英文中應譯為：", "options": ["Your side", "Your party", "You", "Your end"], "answer": 1, "explanation": "正式書信中「你方」的英文為「Your Party」，是法律和行政用語。"}, {"module": 3, "question": "Which Chinese translation best matches「commence」?", "options": ["開始", "展開", "啟動", "著手"], "answer": 0, "explanation": "「Commence」的正式程度高於begin或start，對應中文「啟動」最為合適，常出現在公文之中。"}, {"module": 3, "question": "「終止」的正式英文法律術語是：", "options": ["Stop", "End", "Terminate", "Cease"], "answer": 2, "explanation": "在正式合約或行政文件中，「終止」的標準法律用語為「Terminate」。"}, {"module": 3, "question": "The word「aforesaid」is closest in meaning to:", "options": ["之前提到的", "因此", "上述的", "關於"], "answer": 2, "explanation": "「Aforesaid」為法律/公文用語，意為「上述的」或「前述的」。"}, {"module": 3, "question": "「即時生效」的英文正確表達是：", "options": ["Effective immediately", "Immediate effect", "Take effect now", "With immediate effect"], "answer": 3, "explanation": "「即時生效」在正式文件中標準寫法為「with immediate effect」或「effective immediately」。"}, {"module": 3, "question": "Which of the following is NOT a synonym of「collaborate」?", "options": ["Cooperate", "Coordinate", "Confer", "Collude"], "answer": 3, "explanation": "Collude意為勾結、共謀，帶有負面含義，不是collaborate（合作）的同義詞。"}, {"module": 3, "question": "「前瞻性研究」的英文翻譯是：", "options": ["Forward-looking Research", "Foresight Research", "Prospective Research", "Visionary Research"], "answer": 0, "explanation": "「前瞻性研究」最常見的翻譯為「Forward-looking Research」，強調具有前瞻視野。"}, {"module": 3, "question": "What is the most appropriate translation of「績效評估」?", "options": ["Performance Evaluation", "Effectiveness Assessment", "Achievement Measurement", "Performance Review"], "answer": 0, "explanation": "「績效評估」的標準行政術語為「Performance Evaluation」；Performance Review更偏向面談檢討。"}, {"module": 3, "question": "「學術造假」的正確英文是：", "options": ["Academic Fraud", "Academic Misconduct", "Plagiarism", "Research Misconduct"], "answer": 0, "explanation": "「學術造假」的廣義術語為「Academic Misconduct」，涵蓋偽造數據、抄襲等多種不當行為。"}, {"module": 3, "question": "The Chinese translation of「stakeholder」in higher education context is:", "options": ["股東", "利益相關者", "持份者", "參與者"], "answer": 2, "explanation": "在香港/澳門高教語境中，「stakeholder」習慣譯為「持份者」，而非中國內地常用的「利益相關者」。"}, {"module": 3, "question": "「學院」（大學下的學院）的英文是：", "options": ["College", "School", "Faculty", "Institute"], "answer": 2, "explanation": "在澳門大學體系中，學院通常稱為「Faculty」。College多指住宿式書院。"}, {"module": 3, "question": "「書院」（住宿式書院）的英文是：", "options": ["College", "Dormitory", "Residential College", "Hall"], "answer": 2, "explanation": "住宿式書院的完整英文為「Residential College」，簡稱College。"}, {"module": 3, "question": "The term「non-refundable deposit」means:", "options": ["可退還押金", "不可退還訂金", "部分退還保證金", "無息存款"], "answer": 1, "explanation": "「Non-refundable deposit」為不可退還的訂金/保證金，常出現在註冊繳費通知中。"}, {"module": 3, "question": "「截止日期」的正式英文是：", "options": ["Deadline", "Closing Date", "Due Date", "Cut-off Date"], "answer": 1, "explanation": "行政文書中「截止日期」的正式說法為「Closing Date」；Deadline雖然常用但較口語。"}, {"module": 3, "question": "Which of these is the correct translation of「擬稿」?", "options": ["To draft", "To copy", "To propose", "To approve"], "answer": 0, "explanation": "「擬稿」意為草擬文稿，英文為「To draft」。"}, {"module": 3, "question": "「核簽」的英文是：", "options": ["To sign", "To countersign", "To endorse", "To approve"], "answer": 1, "explanation": "「核簽」指會簽或副署，標準英文為「Countersign」。"}, {"module": 3, "question": "What does「外判」mean in English?", "options": ["Outsourcing", "Outplacement", "External judgment", "Out-of-court"], "answer": 0, "explanation": "「外判」（港澳用語）即外包，英文為「Outsourcing」。"}, {"module": 3, "question": "「公積金」的英文是：", "options": ["Provident Fund", "Pension Fund", "Retirement Fund", "Public Accumulation Fund"], "answer": 0, "explanation": "「公積金」在港澳行政體系中標準說法為「Provident Fund」。"}, {"module": 3, "question": "Which is the most correct translation of「以作備考」?", "options": ["For your reference", "For record purposes", "For your information", "For backup"], "answer": 1, "explanation": "「以作備考」在文書處理中意為存檔備查，最精確的翻譯為「For record purposes」。"}, {"module": 4, "question": "你在協調澳大40週年校慶典禮時，距離開始還有15分鐘，發現主禮嘉賓—校長仍未到場。現場已有300多名師生就座。以下最恰當的處理方式是什麼？", "options": ["A. 立即宣布活動延後，請師生原地等待", "B. 先用活動暖場影片或表演填補時間，並派同事即時聯繫校長助理確認位置", "C. 直接打電話給校長本人", "D. 宣布活動取消，擇日再辦"], "answer": 1, "explanation": "最佳做法是B。用預備節目填補空檔，同時低調聯繫校長助理（而非直接打擾校長），既避免嘉賓尷尬，也維持現場氣氛。A會造成師生焦躁；C過於唐突；D反應過度。"}, {"module": 4, "question": "你在行政辦公室處理新生入學報到，一位家長情緒激動地投訴說排隊太久，指責學校行政效率低下。你應該如何回應？", "options": ["A. 「不好意思，今天人比較多，沒辦法」", "B. 「我理解您的心情，今天確實是報到高峰。我馬上幫您查看能否加快流程，請稍等一下」", "C. 「這是學校流程規定的，我也沒辦法」", "D. 「請您去跟院長投訴」"], "answer": 1, "explanation": "B使用同理心回應（「我理解您的心情」）並主動提供解決方案，是最專業的投訴處理方式。A和C把責任推給制度和他人；D是推卸責任的錯誤做法。"}, {"module": 4, "question": "橫琴校區的一間多媒體教室在早上第一節課前突然投影系統故障。你作為行政人員接到通知，距離上課還有20分鐘。應該優先做什麼？", "options": ["A. 通知所有當天使用該教室的教授自行想辦法", "B. 立即聯繫IT支援同時調配備用教室，並準備手寫白板作為備案", "C. 先查明誰是上一節課的使用者，追究責任", "D. 在教室門口貼公告說設備故障"], "answer": 1, "explanation": "B是正確的危機處理順序：先解決問題（聯絡IT＋調備用教室＋提供備案），事後再跟進檢修。A推卸責任；C優先問責而非解決問題；D消極處理。"}, {"module": 4, "question": "學院收到一封措辭嚴厲的投訴信，指控某行政人員在電話中態度惡劣。院長要求你處理。第一步你應該做什麼？", "options": ["A. 直接約談該行政人員並給予警告", "B. 先回覆投訴者道歉並承認錯誤", "C. 先聽取該行政人員的版本，並調閱通話記錄（如有）了解事實", "D. 將投訴信存檔不理會"], "answer": 2, "explanation": "C體現了STAR框架中的「Situation」：先了解事實再行動。A預設立場；B在未查明事實前道歉可能不恰當；D完全失職。"}, {"module": 4, "question": "你今天有五項緊急工作：A) 校長下午3點要的報告；B) 一位教授投訴後跟進回覆；C) 明天活動的場地最後確認；D) 部門例會紀錄歸檔；E) 其他部門詢問的跨年度預算資料。你的優先級排序應該是什麼？", "options": ["A. A→C→B→E→D", "B. D→E→C→B→A", "C. A→B→C→E→D", "D. C→D→A→B→E"], "answer": 2, "explanation": "A（校長報告，時限緊迫且層級高）最優先，B（投訴跟進）其次因為涉及服務品質，C（活動確認）第三因為明天就要用，E（跨部門請求）第四，D（歸檔）最不緊急。C符合時間管理和重要性優先原則。"}, {"module": 4, "question": "你在籌辦學術研討會時發現預算被削減了30%，但活動規模和內容要求不變。身為主要統籌，你該如何應對？", "options": ["A. 直接告知教授無法舉辦", "B. 重新審視各項開支，列出可節省的項目（如茶點從五星級改為大學餐廳）、尋求校內外贊助、以及調整活動形式（如部分環節改線上）", "C. 無視預算，照原計畫花費再申請追加預算", "D. 刪除所有嘉賓演講環節"], "answer": 1, "explanation": "B展現靈活應變和預算管理能力：盤點可節省項目、開拓額外資源、適度調整活動形式。A直接放棄；C不負責任；D過度刪減影響活動品質。"}, {"module": 4, "question": "院長在重要會議上突然問到一個你完全沒有準備的數據，且所有同事都在場。你該怎麼回應？", "options": ["A. 「抱歉，我沒有準備這個」", "B. 編一個大概的數字以免尷尬", "C. 「我目前手上沒有這個數據，請讓我記錄下來，會議後30分鐘內整理好給您」", "D. 「這不關我的事」"], "answer": 2, "explanation": "C是專業的回應方式：坦承沒有數據、主動承諾跟進時間，展現解決問題的態度。A雖誠實但缺乏積極性；B編造數據極不專業且可能造成嚴重後果；D態度惡劣。"}, {"module": 4, "question": "一位同事連續兩週請病假，他負責的迎新活動籌備工作進度嚴重落後。距離活動只剩一週，你被指派接手。按照STAR框架，你應該先做什麼？", "options": ["A. 馬上打電話罵該同事不負責任", "B. 直接按照自己的方式從頭規劃", "C. 先聯繫該同事（在不打擾休養的前提下）取得目前進度文件，並與團隊開會確認已完成事項和剩餘待辦", "D. 推掉這個任務並告訴上司你也很忙"], "answer": 2, "explanation": "C對應STAR的S（Situation）：先了解接手時的現狀，避免重複工作或遺漏關鍵環節。A於事無補且不近人情；B忽略既有進展可能造成混亂；D不負責任。"}, {"module": 4, "question": "在跨部門協調會議上，資訊發展部和教務處對新系統的上線時間意見分歧，會議陷入僵局。作為會議主持人，你應該怎麼做？", "options": ["A. 直接由你決定上線日期", "B. 暫緩討論，建議雙方會後提交各自理據和風險評估，再安排下一次會議由更高層級裁決", "C. 無限期擱置該議題", "D. 投票表決"], "answer": 1, "explanation": "B是專業的會議管理方式：避免當場衝突、讓雙方整理論據、必要時升級決策層級。A主持人不宜越權決策；C消極；D投票不適合需要專業判斷的技術問題。"}, {"module": 4, "question": "你收到一封來自橫琴校區合作企業的投訴郵件，指控澳大學生在實習期間工作態度消極。這封郵件同時CC給了副校長。你第一時間應該怎麼做？", "options": ["A. 直接回覆企業道歉", "B. 忽視郵件，等副校長先回應", "C. 立即通知相關學院的實習負責人，收集涉事實習生的具體情況，並在24小時內擬定回應草稿給上級審閱", "D. 轉發郵件給該學生"], "answer": 2, "explanation": "C正確：被CC給高層代表此事受關注，必須迅速行動——先了解事實、然後準備專業回應。A未查明情況就道歉不妥；B消極等待；D直接轉發學生極不恰當。"}, {"module": 4, "question": "行政部門進行年中績效評估，你的下屬在主要工作上都表現達標，但在溝通協調上屢有投訴。作為主管，你應如何給予反饋？", "options": ["A. 只看工作成果，溝通問題不影響績效", "B. 公開批評他讓所有人知道", "C. 進行一對一面談，先肯定其工作成果，再具體舉例說明溝通問題的影響，並共同制定改善計畫（如安排溝通培訓）", "D. 在績效評分上直接給最低分"], "answer": 2, "explanation": "C是建設性的績效管理方式：先肯定後引導（Sandwich Feedback），具體指出問題並提供改善資源。A忽略問題；B公開羞辱降低士氣；D缺乏輔導只懲罰。"}, {"module": 4, "question": "你負責統籌部門的年終聚餐，有同事私下跟你說不想去，因為他跟上司關係緊張。你該如何處理？", "options": ["A. 告訴全組該同事不想去", "B. 強迫他參加因為是團隊活動", "C. 私下表示理解，告訴他可以自由選擇參加與否，如果有任何問題可以隨時找你聊聊", "D. 直接跟上司報告這件事"], "answer": 2, "explanation": "C尊重同事感受和隱私，同時保持開放支持態度。A洩露隱私；B強迫參加適得其反；D製造更多辦公室矛盾。"}, {"module": 4, "question": "澳大進行部門重組，你的工作崗位可能被裁撤。管理層要求你協助整理自己部門的工作流程以利交接。你會怎麼做？", "options": ["A. 拒絕合作，因為這等於幫公司裁掉自己", "B. 拖延進度，希望重組計畫胎死腹中", "C. 以專業態度完成交接文件，同時主動了解是否有其他內部調崗機會，並更新履歷", "D. 消極應付，給錯誤的流程資訊"], "answer": 2, "explanation": "C展現專業素養：即使面臨不確定性仍完成分內工作，同時為自己做職業規劃。A、B、D都不專業且可能影響日後職涯發展。"}, {"module": 4, "question": "你在安排一個重要的國際學術會議的議程時，發現兩位知名學者都要求在上午9-11點的主時段演講，但場地只能安排一場。你該怎麼協調？", "options": ["A. 告訴其中一位時間已被佔用，請他選其他時間", "B. 將兩人安排在兩個不同場地同時進行", "C. 先與兩位學者分別溝通，說明場地限制，主動提供幾個替代方案（如其中一人改為主題演講、或安排在下午但仍保留優先時段），徵求他們的意見", "D. 隨機抽籤決定"], "answer": 2, "explanation": "C是最佳做法：主動溝通、尊重嘉賓、提供彈性選擇。A單方面通知可能得罪嘉賓；B可能導致聽眾分散；D不夠尊重嘉賓。"}, {"module": 4, "question": "你在一場公開活動的問答環節中，有一位觀眾提出一個極為尖銳且帶有政治敏感的問題，直接針對學校的某項政策。你該如何應對？", "options": ["A. 直接回答個人觀點", "B. 要求保安請該觀眾離場", "C. 「感謝您的提問。這個問題涉及學校政策的全面考量，我建議我們可以會後進一步交流，或者我可以幫您轉達給相關部門。我們先繼續下一位觀眾的提問好嗎？」", "D. 「不予置評」"], "answer": 2, "explanation": "C是公關危機處理的標準手法：保持禮貌、不激化矛盾、不發表未經授權的言論、引導至會後處理。A可能違反學校立場；B過度反應引發公關災難；D給人不誠懇的印象。"}, {"module": 4, "question": "你發現部門中另一位同事在未經授權的情況下，將內部會議記錄轉發給校外人士。你應該怎麼做？", "options": ["A. 當作沒看到", "B. 私下提醒該同事這樣做不妥，並建議他立即刪除；同時如果涉及機密資訊，應向上級報告", "C. 直接向校長檢舉", "D. 在群組公開責備他"], "answer": 1, "explanation": "B是先內部解決的正確方式：先提醒同事並給予改正機會，涉及機密時再升級處理。A等同漠視違規；C跳級舉報可能破壞團隊信任；D公開羞辱不恰當。"}, {"module": 4, "question": "你明天要負責一個重要的校務會議的場地布置和設備測試。今天下班前你應該做什麼？", "options": ["A. 明天提早半小時到場準備", "B. 今天先檢查所有設備（投影、音響、麥克風、網路）並準備備用方案，確認場地布置圖，並通知相關人員明天集合時間", "C. 相信學校設備不會出問題", "D. 發郵件給參會者提醒他們準時"], "answer": 1, "explanation": "B是周詳的準備工作：提前一天進行設備檢查和備案準備，是活動成功的關鍵。A太冒險，若設備故障無法及時處理；C過於樂觀；D只是提醒參會者，忽略硬體準備。"}, {"module": 4, "question": "一位內地交換生的家長打電話來，情緒激動地表示孩子在澳大宿舍與室友發生嚴重衝突，要求學校立刻處理。電話中你了解到孩子目前安全。你應該：", "options": ["A. 「我馬上聯繫學生輔導中心和宿舍管理處，先了解情況再回覆您」—", "B. 跟家長說這是學生之間的事，學校不管", "C. 直接答應家長換宿舍", "D. 讓家長等孩子自己處理"], "answer": 0, "explanation": "A正確：先安撫家長情緒，立即啟動校內支援網絡（輔導中心＋宿舍管理），了解事實後再回覆。B冷漠失職；C在未了解情況前過早承諾；D對正在衝突中的學生不負責任。"}, {"module": 4, "question": "在行政單位推行一項新的電子表單系統，但資深同事們普遍抗拒使用，認為不如紙本方便。作為專案負責人，你應採取什麼策略？", "options": ["A. 「不用的話就沒有紙本了，逼他們用」—", "B. 舉辦小型培訓工作坊，強調新系統的好處（節省時間、減少錯誤），並先從自願者開始試行，建立成功案例", "C. 暫緩實施", "D. 只要求年輕同事使用"], "answer": 1, "explanation": "B是變革管理的最佳實務：透過教育訓練、強調好處、先從小範圍成功經驗開始，降低抗拒。A強迫手段適得其反；C因噎廢食；D造成不同待遇引發不滿。"}, {"module": 4, "question": "你在學院辦公室接到一通匿名電話，指控某教授在期末評分上對學生有偏見。你應如何處理？", "options": ["A. 直接掛斷電話", "B. 記錄所有資訊（時間、來電者提供的具體指控內容），告知來電者可以通過正式管道（如教務處或院長信箱）提出申訴以獲得正式處理，並將記錄上報", "C. 立刻去質問該教授", "D. 告訴所有同事這件事"], "answer": 1, "explanation": "B正確：匿名投訴仍應記錄備案，但引導至正式申訴管道才能確保程序正義。A忽略潛在問題；C未經核實就質疑教授極不妥；D散播未證實消息。"}, {"module": 4, "question": "一個颱風天，澳大宣布下午停課，但你作為行政人員需要在校處理緊急事務。你應優先做什麼？", "options": ["A. 馬上下班回家", "B. 檢查辦公室門窗水電、確認重要設備和文件安全、與值班同事協調應急方案", "C. 繼續處理日常文書工作", "D. 打電話問朋友颱風假的安排"], "answer": 1, "explanation": "B是颱風天留守的正確程序：先做安全檢查和應急準備，確保財產和資料安全。A擅離職守；C忽略安全檢查；D私人事務。"}, {"module": 4, "question": "你在會議上提出的方案被上司當面否決，而且語氣較重。你會如何反應？", "options": ["A. 當場辯駁直到上司認同", "B. 沉默不語但心裡不滿", "C. 記錄上司的反饋意見，表示會參考這些建議進行修改，會後再深入了解上級的具體考量後重新調整方案", "D. 從此不再提任何建議"], "answer": 2, "explanation": "C是專業的職場態度：尊重上級決策、主動收集反饋、尋求改進方向。A公開對抗影響團隊和諧；B消極應對；D過度退縮。"}, {"module": 4, "question": "你負責統計部門年度工作報告，需要在三天內提交。但還有兩個單位未提交數據，你已催促三次。你的下一步？", "options": ["A. 放棄，提交不完整的報告並備註原因", "B. 直接編造預估數據", "C. 第四度發郵件同時抄送該單位主管，說明截止日期和未提交的影響，並電話直接聯繫該單位的負責人了解卡關原因", "D. 跟上司說做不到"], "answer": 2, "explanation": "C升級催促方式：CC主管增加壓力，同時主動電話了解原因，展現解決問題的態度。A可以作為最後手段但不是第一步；B偽造數據不專業；D輕易放棄。"}, {"module": 4, "question": "你發現部門採購流程中有重大漏洞，可能導致浪費公帑。但你只是基層行政人員，你認為應該：", "options": ["A. 什麼都不說，怕得罪人", "B. 在社交媒體上匿名爆料", "C. 整理具體證據和改善建議，通過適當管道（如直屬主管或內部審計）提出", "D. 直接發郵件給廉政公署"], "answer": 2, "explanation": "C是正確的內部舉報程序：收集證據、提出建設性方案、透過正式管道呈報。A失職；B非法且不負責任；D跳級舉報應保留至內部管道無效時。"}, {"module": 4, "question": "在迎新活動中，一位新生突然暈倒。現場有約200人在場。你作為工作人員應優先：", "options": ["A. 大聲呼喊讓所有人讓開", "B. 保持冷靜，立即呼叫校園急救人員（或撥打999），疏散圍觀人群保持通風，同時安排其他同事繼續進行活動不被中斷", "C. 拿手機拍攝留存證據", "D. 給學生喝水"], "answer": 1, "explanation": "B是急救SOP：呼叫專業協助、維持現場秩序、保護病患隱私、同時維持活動進行。A引起恐慌；C侵犯隱私；D在未確診前不當餵食。"}, {"module": 4, "question": "你的部門主管常在最後一刻才交辦緊急任務，嚴重影響你的工作安排和準時下班。你該如何處理？", "options": ["A. 默默忍受，不敢反映", "B. 跟同事一起抱怨主管", "C. 找合適時機，以「為提高工作效率」為角度，禮貌地與主管溝通目前工作量的情況，並詢問是否有辦法更早獲得任務預告", "D. 直接告訴主管你不想加班"], "answer": 2, "explanation": "C是向上管理的技巧：以工作效能為出發點，而非個人抱怨。A長期累積壓力；B製造負面氛圍；D語氣過於直接。"}, {"module": 4, "question": "澳大計劃與橫琴粵澳深度合作區的一所中學簽署合作備忘錄。你負責草擬備忘錄，應該先做什麼？", "options": ["A. 上網找一個模板直接改", "B. 查找校內過去類似MOU的範例，與法務部門確認格式要求，並與合作方溝通主要條款", "C. 直接寫然後讓校長簽字", "D. 請中學方提供完整草案"], "answer": 1, "explanation": "B正確：參考校內既有模板確保格式合規，徵詢法務意見避免法律風險，與合作方溝通確保共識。A忽略校內規範；C跳過審查流程；D被動且可能遺漏校方利益。"}, {"module": 4, "question": "你經手的某項採購被內部審計指出了程序瑕疵。審計報告已提交給管理層。你應該：", "options": ["A. 辯稱是流程問題不是你的錯", "B. 承認疏忽，詳細說明事情經過，提出具體的改正措施防止再犯", "C. 刪除相關郵件記錄", "D. 指責是其他同事的問題"], "answer": 1, "explanation": "B展現誠信和責任感：STAR中的Action和Result——承認錯誤、提出改善方案。A推卸責任；C銷毀證據可能違法；D轉移責任不專業。"}, {"module": 4, "question": "學院要舉辦一場跨學科座談會，需要邀請三個不同學院的教授參與。你發出的邀請郵件中，最重要的是：", "options": ["A. 用華麗的詞藻描述活動", "B. 清楚說明活動目的、時間地點、教授的角色和時長、以及對他們的期待，並附上議程草案", "C. 只寫時間地點", "D. 在信中強調這對他們升等有幫助"], "answer": 1, "explanation": "B是專業的邀請函：清楚傳達活動資訊、尊重教授的時間、提供足夠的上下文。A過於花俏；C資訊不足；D可能被視為不尊重。"}, {"module": 4, "question": "某天你發現辦公室的印表機在大量列印不明文件，查看後發現是另一位同事在列印私人投資理財資料。你應：", "options": ["A. 大聲喝止他", "B. 私下提醒同事公家資源不應用於私人用途，也記錄此事以防後續問題", "C. 幫他一起印", "D. 馬上報告院長"], "answer": 1, "explanation": "B是恰當處理：先私下提醒，既維護同事尊嚴又達到糾正目的。A公開羞辱不恰當；C縱容不當行為；D對小違規層級過高反應。"}, {"module": 4, "question": "在提交重要報告前的最後審查時間，你發現了一個數據錯誤，但修正需要重新跑三天的數據。報告兩小時後就要交。你應該：", "options": ["A. 假裝沒看到", "B. 修正錯誤後準時提交，即使部分章節不夠完善", "C. 立即告知主管此情況，說明數據修正需時，以及對報告提交的影響，提出可行方案（如先提交初步版本後補修正）", "D. 隨便改一個數字讓帳面平衡"], "answer": 2, "explanation": "C是誠信且專業的做法：及時上報問題、主動提出解決方案。A隱瞞錯誤；B擅自延遲；D偽造數據最不可取。"}, {"module": 4, "question": "一位知名學者在演講中公開批評澳大的某項學術政策，引起台下學生議論。你作為活動工作人員應如何應對？", "options": ["A. 立即打斷學者發言並糾正他", "B. 若情況在可控範圍內，保持中立，讓學術自由發言；會後再向上級報告並視需要整理會議記錄提供給相關部門", "C. 取消該學者的後續活動資格", "D. 要求主辦教授出面制止"], "answer": 1, "explanation": "B尊重學術自由，且不當場激化矛盾。現場記錄後內部處理。A不尊重學術自由、影響活動氣氛；C過度反應；D推卸責任。"}, {"module": 4, "question": "你要為一個國際研討會製作名牌，發現一位外賓的名字拼法與簽證文件不一致。你應該：", "options": ["A. 按照護照上的拼法印製", "B. 按照邀請函上的拼法印製", "C. 先與該外賓確認哪個是正確的拼法，並詢問是否已經向飯店和簽證單位更正", "D. 兩種都印"], "answer": 2, "explanation": "C正確：名字的正確性至關重要，直接與本人確認最保險。A/B單方面決定可能出錯；D浪費資源且顯示混亂。"}, {"module": 4, "question": "你的團隊中有兩位同事因工作分配問題公開吵架，影響辦公室氣氛。作為團隊協調者，你應該：", "options": ["A. 不介入，讓他們自己解決", "B. 分別約談兩位同事了解情況，再安排一次調解會議，協助他們找到雙方都能接受的方案", "C. 在部門會議上公開批評兩人", "D. 重新分配工作避開兩人交集"], "answer": 1, "explanation": "B是妥善的衝突管理：個別了解→調解會議→尋求共識。A放任可能導致衝突升級；C公開批評傷害自尊；D治標不治本。"}, {"module": 4, "question": "你收到校長辦公室的通知，要求在一週內提交一份全院的活動清單及經費使用分析。你手邊沒有現成資料。第一步是什麼？", "options": ["A. 先回覆「收到」，再開始著手搜集", "B. 不回覆，直接開始做", "C. 先回覆確認收到，同時詢問是否有特定格式或重點要求，然後開始向各部門搜集資料", "D. 告訴校長一週太趕"], "answer": 2, "explanation": "C是最佳做法：先確認任務（回覆收到），再釐清需求（確認格式和重點），最後展開工作。A漏了確認需求；B不禮貌；D還未嘗試就先拒絕。"}, {"module": 4, "question": "一名學生衝進辦公室大喊：「我的畢業證書上有錯字！」情緒非常激動。你該如何處理？", "options": ["A. 「這不關我的事，你要去註冊處」", "B. 請學生先冷靜坐下，耐心了解是哪個字錯了，安撫他「我們會全力處理」，立即聯繫註冊處查詢補發流程", "C. 跟他說證書已經簽發不能更改", "D. 叫他回去等通知"], "answer": 1, "explanation": "B正確：先情緒安撫（冷靜坐下→同理心），釐清問題，再啟動補救流程。A推卸責任；C未經查證就拒絕；D沒有給學生安全感。"}, {"module": 4, "question": "在部門會議中，你注意到一位新同事似乎想發言但一直沒有機會，因為資深同事主導了討論。作為會議主持人，你應該：", "options": ["A. 忽略，等他自己爭取發言", "B. 直接說「新同事你有什麼想法嗎？」", "C. 在適當的時機點名邀請：「剛才我們討論了XX，XX同事你在這方面有沒有想補充的？」", "D. 會後私下問他"], "answer": 2, "explanation": "C是最圓融的引導方式：以議題相關的形式點名，不讓新同事感到被特別關注的壓力，同時鼓勵參與。A可能讓新人被邊緣化；B過於直接可能讓新人緊張；D錯過會議討論時機。"}, {"module": 4, "question": "你負責安排院長出差行程，院長臨時要求在行程中加入與橫琴政府官員的非正式會面。你應該：", "options": ["A. 直接打電話給該官員約時間", "B. 先確認院長原本行程的窗口時間，然後通過正式管道（如政府辦公室）提出會面請求，並提供院長的背景資料和會面目的", "C. 加入行程但不預約", "D. 告訴院長排不進去"], "answer": 1, "explanation": "B正確：先盤點行程空檔，透過正式管道預約，提供必要背景資訊，展現專業的行程管理能力。A跳過正式管道不禮貌；C不預約形同虛設；D輕易拒絕上級需求。"}, {"module": 4, "question": "同事在處理機密學生檔案時沒有鎖螢幕就離開座位。你經過時看到了。你應該：", "options": ["A. 幫忙鎖上螢幕然後不張揚", "B. 大聲提醒所有人注意", "C. 幫他鎖上螢幕，等同事回來後私下提醒他機密資料的保護原則", "D. 順便瀏覽一下檔案內容"], "answer": 2, "explanation": "C正確兼顧安全和人際：即時保護機密（鎖螢幕），私下提醒避免尷尬。A只解決眼前問題但沒有教育意義；B令同事難堪；D侵犯隱私絕不可取。"}, {"module": 4, "question": "你在校內咖啡廳意外聽到兩位教授在批評你的部門主管管理不善。你應該：", "options": ["A. 加入討論並表達同感", "B. 假裝沒聽到", "C. 不參與討論，但留意是否有需要向主管反映的客觀事實，避免傳播未經證實的言論", "D. 馬上去告訴主管"], "answer": 2, "explanation": "C是成熟的做法：不傳播八卦、不參與背後批評，但保持專業敏感度。A參與八卦不專業；B雖可但錯失了解重要訊息的機會；D打小報告破壞同事信任。"}, {"module": 4, "question": "你的辦公室收到一份來自政府部門的機密文件，需要院長親自簽收。院長正在開會。你應該：", "options": ["A. 直接拆開確認內容後再轉交", "B. 妥善保管文件，標註「機密—院長親啟」，在院長會議結束後第一時間親手交給院長", "C. 掃描後發電子郵件給院長", "D. 放院長桌上即可"], "answer": 1, "explanation": "B正確：機密文件不能隨意拆封或掃描，必須確保安全傳遞鏈。A違反機密處理原則；C掃描和電子傳送有洩密風險；D無人看管不安全。"}, {"module": 4, "question": "你在籌劃一場跨部門培訓時，發現兩個部門對於培訓內容有完全不同的需求。作為統籌者，你應：", "options": ["A. 按照自己的判斷決定內容", "B. 讓兩個部門各自舉辦自己的培訓", "C. 召開需求共識會議，找出兩部門需求的交集和差異，設計模組化培訓（共同部分合班上課、專業部分分開）", "D. 取消培訓"], "answer": 2, "explanation": "C是資源整合的最佳解：透過溝通找共識，設計彈性培訓方案，既節省資源又滿足不同需求。A忽略部門意見；B未能整合資源；D逃避問題。"}, {"module": 4, "question": "一位同事在辦公室聚會中喝醉酒，說了不合適的話讓場面尷尬。你該怎麼辦？", "options": ["A. 當場斥責他", "B. 幽默地轉移話題緩和氣氛，隔天再私下關心同事並提醒注意場合", "C. 錄影並傳給其他人看", "D. 從此不邀請他參加活動"], "answer": 1, "explanation": "B兼顧當場和事後：現場化解尷尬保護同事面子，隔天再私下提醒。A當眾羞辱過度；C侵犯隱私和尊嚴；D排擠同事。"}, {"module": 4, "question": "在執行STAR框架回答面試問題時，以下哪個是描述「Task」的正確方式？", "options": ["A. 「當時辦公室氣氛很緊張」", "B. 「我的任務是在三天內完成一份全新的活動策劃書，涵蓋預算、流程和風險評估」", "C. 「我成功地把預算削減了20%」", "D. 「我打電話給供應商詢問價格」"], "answer": 1, "explanation": "B正確描述Task：具體、可衡量、有時間限制、說明責任範圍。A是Situation；C是Result；D是Action，三者都不符合Task的要求。"}, {"module": 4, "question": "以下哪個STAR故事中的「Result」部分寫得最好？", "options": ["A. 「最後活動順利完成了」", "B. 「活動參與人數達到預期目標的120%，會後滿意度調查平均4.8/5分，並獲得校長公開表揚」", "C. 「同事們都很喜歡」", "D. 「沒有發生意外」"], "answer": 1, "explanation": "B使用具體量化數據（120%、4.8/5分、校長表揚）來呈現成果，比A、C、D的模糊描述更有說服力。"}, {"module": 4, "question": "你發現自己犯了一個錯誤，導致一份已經發送給全校的公告郵件中有日期錯誤。你應該：", "options": ["A. 假裝沒發生", "B. 立即發布更正公告，標題清楚標註「更正」，說明錯誤之處和正確日期，並向受影響的同事道歉", "C. 只發郵件給少數可能受影響的人", "D. 怪罪審稿的人"], "answer": 1, "explanation": "B是錯誤處理的正確態度：迅速更正、範圍全面、誠實道歉。A讓錯誤繼續擴散；C未覆蓋所有受影響者；D推卸責任。"}, {"module": 4, "question": "學期初選課高峰期，教務處的電話響個不停，你同時要處理櫃檯排隊的學生、接聽電話、和回覆電郵。你應如何管理？", "options": ["A. 先接電話，不管櫃檯", "B. 先處理櫃檯因為人在面前，電話讓它響", "C. 迅速判斷各項事務的緊急程度：簡單問題快速處理、複雜問題請對方留下聯絡方式稍後回覆、同時設置自動回覆告知等待時間", "D. 關掉電話專注處理櫃檯"], "answer": 2, "explanation": "C是多重任務處理的高效做法：快速分流、設定期望、有條不紊。A/B忽略其中一項；D關閉服務管道不當。"}, {"module": 4, "question": "一位校外貴賓來訪澳大，在圖書館參觀時不慎跌倒受傷。你作為接待人員應優先：", "options": ["A. 繼續參觀行程", "B. 立即評估傷勢，呼叫校園醫護，安撫貴賓，並通知接待主管調整後續行程", "C. 扶起貴賓並繼續走", "D. 打電話給貴賓的家屬"], "answer": 1, "explanation": "B正確：安全第一原則——先處理傷情、呼叫專業協助、通知主管調整行程。A忽視傷情風險；C可能造成二次傷害；D順序錯誤。"}, {"module": 4, "question": "學院收到一筆匿名捐款，金額不大但附帶條件要求指定用於某個特定研究方向。你該如何處理？", "options": ["A. 直接接受，有錢就好", "B. 先查詢校內捐款接受政策與程序，確認匿名捐款和附帶條件的合規性，再轉交財務與法務部門處理", "C. 退回捐款", "D. 自己決定如何使用"], "answer": 1, "explanation": "B正確：匿名捐款和指定用途捐款都需要合規審查，涉及潛在的利益衝突或法律問題。A過於草率；C未經審查就退回；D超越權限。"}, {"module": 4, "question": "你在一個項目中負責協調三個部門的合作，但A部門經常延遲交付，導致B和C部門的工作受阻。你應該：", "options": ["A. 在群組公開批評A部門", "B. 與A部門主管一對一溝通，了解延遲原因，並協助梳理流程瓶頸，同時在項目會議上討論調整時間表", "C. 直接向院長報告A部門不配合", "D. 降低A部門的工作要求"], "answer": 1, "explanation": "B是跨部門協調的正確方法：先了解根本原因、提供協助、再調整計劃。A公開指責破壞關係；C越級投訴可能無效；D降低標準影響品質。"}, {"module": 4, "question": "新生入學說明會上，一名聽不懂粵語/普通話的英語國際生舉手表示完全聽不懂台上的講解。你應該：", "options": ["A. 「等下再問同學」", "B. 立即安排英語流利的同事或學生大使進行一對一講解，同時未來活動應提前準備雙語或英語講義", "C. 給他一張紙叫他回去自己看", "D. 叫他去國際事務部"], "answer": 1, "explanation": "B正確：現場立即解決需求（一對一講解），同時從制度面改進（未來準備英語資料）。A推遲不解決問題；C消極處理不友善；D轉介雖可但不是最即時的幫助。"}, {"module": 4, "question": "你的直屬上司經常在周五下午4:45才交辦需要周一早上9點前完成的工作。你如何處理這種情況？", "options": ["A. 每周五下午提前關閉即時通訊軟體", "B. 平時就向上司了解下周的工作重點，周五上午主動向上司確認是否有周末前需要處理的事項", "C. 周一再說自己沒看到", "D. 發郵件給人資部門投訴"], "answer": 1, "explanation": "B是主動的向上管理：提前掌握工作動向、化被動為主動。A逃避責任；C不誠實；D直接投訴破壞上下級關係。"}, {"module": 4, "question": "在一個重要的校務會議中，投影機突然故障，而你的簡報就在上面。你該怎麼辦？", "options": ["A. 取消簡報", "B. 冷靜地將簡報內容手寫在白板上，或者直接口頭報告，同時請同事聯繫IT處理投影機", "C. 讓所有人等待投影機修好", "D. 道歉後坐下"], "answer": 1, "explanation": "B展現臨場應變能力：不依賴科技、用手寫或口頭完成簡報，同時低調處理設備問題。A/D放棄簡報機會；C浪費與會者時間。"}, {"module": 4, "question": "你的部門要招聘一名行政助理，你負責面試。以下哪種提問最能評估應徵者的危機處理能力？", "options": ["A. 「你為什麼想來澳大工作？」", "B. 「請描述一個過去的工作經驗中，你遇到突發狀況並成功解決的例子，使用了哪些具體步驟？」", "C. 「你的優缺點是什麼？」", "D. 「你對未來的規劃是什麼？」"], "answer": 1, "explanation": "B是行為式面試問題（STAR導向），要求應徵者提供具體案例來展示危機處理能力。A、C、D都是常見問題但無法評量危機處理。"}, {"module": 4, "question": "一位同事離職了，他遺留的工作需要交接給你。但交接文件非常簡略，很多細節不清楚。你應該：", "options": ["A. 抱怨離職同事不負責任", "B. 憑經驗自行判斷處理", "C. 先盤點所有遺留工作的清單，標出不清楚的部分，逐一聯繫離職同事（取得同意後）、相關單位或查閱歷史檔案來補足資訊", "D. 暫時放置等有人來問再說"], "answer": 2, "explanation": "C是系統性的交接接管方法：盤點→標記問題→多渠道補足資訊。A無濟於事；B可能出錯；D不負責任。"}, {"module": 4, "question": "疫情期間，澳大需要臨時將一門線下期末考試改為線上進行，但只有三天準備時間。作為考試籌劃人員，你首先要做什麼？", "options": ["A. 直接取消考試", "B. 立即確認學校可用的線上考試平台、技術支援資源、與教務處確認線上考試的合規要求，然後制定應急方案", "C. 讓教授自己決定", "D. 發通知讓學生不用考試"], "answer": 1, "explanation": "B正確：盤點可用資源→確認合規要求→制定方案，是應急管理三步驟。A/D反應過度；C缺乏統籌和品質把關。"}, {"module": 4, "question": "你收到一封來自學生家長的郵件，用詞非常情緒化，指責學校宿舍管理不善導致其孩子生病。你回覆郵件時應注意：", "options": ["A. 用同樣強烈的語氣回覆", "B. 忽略情緒性言詞，專注於事實和解決方案，保持專業禮貌的語氣，同時表達關心", "C. 不應該直接回覆，轉給律師處理", "D. 回一封極短的回覆說「已收到」"], "answer": 1, "explanation": "B是專業的投訴回覆：區分情緒和事實、保持專業語氣、表達同理心。A火上加油；C過度反應；D過於冷淡不解決問題。"}, {"module": 4, "question": "在一個耗時半年的跨部門項目中，你發現依照目前的進度無法在截止日前完成。你應該何時提出這個問題？", "options": ["A. 到截止日當天再說", "B. 越早發現越早提出，在發現進度落後時就立即向項目負責人報告，並提出修正計畫", "C. 默默加班做完不讓別人知道", "D. 降低標準趕工"], "answer": 1, "explanation": "B是項目管理的基本原則：及早發現及早通報，越早越有調整空間。A隱瞞到最後一刻；C不顧個人健康且可能影響品質；D未經授權降標。"}, {"module": 4, "question": "你的部門正在進行ISO品質管理認證，需要撰寫標準作業程序(SOP)。一個資深同事堅稱「做了幾十年不用寫也知道」。你作為SOP統籌人應：", "options": ["A. 跳過他找其他人寫", "B. 尊重他的經驗，請他以口述方式分享工作流程，你來整理成草稿再請他確認", "C. 強迫他按照格式撰寫", "D. 報告主管他不配合"], "answer": 1, "explanation": "B是說服資深同事的智慧：善用他的經驗但降低他的負擔（他口述你整理），讓他參與但不感到被強迫。A可能遺漏關鍵知識；C引起反抗；D破壞關係。"}, {"module": 4, "question": "你在辦理一個大型學術會議的註冊時，發現系統超賣了30個名額，而場地最多只能容納200人。你該如何處理？", "options": ["A. 取消最後報名的30人並道歉", "B. 先確認場地是否有可能增加座位或開放站立區，同時準備直播／線上參會方案給超額報名者選擇，再逐一與受影響者溝通", "C. 不處理，讓現場自行消化", "D. 隨便增加30張椅子"], "answer": 1, "explanation": "B正確：先找解決方案（加座位、直播），再一一溝通，盡量讓所有人都有參與方式。A強硬取消損害校譽；C火災逃生風險；D消防違規。"}, {"module": 4, "question": "你負責撰寫一份提交給政府部門的補助申請報告。距離截止日期還有一週，但主要研究數據還未完成統計。你應該：", "options": ["A. 先提交一份進度報告請求延期", "B. 催促研究團隊提供初步數據，先行撰寫其他章節，預留最後兩天給數據處理", "C. 先填上預估數據之後再修改", "D. 放棄申請"], "answer": 1, "explanation": "B是時間管理的最佳實踐：遇到瓶頸時先處理可完成的部分，同時催促關鍵環節。A可以作為B方案但不是首選；C不誠實；D輕易放棄。"}, {"module": 4, "question": "你無意中收到一封誤發的郵件，內容是關於另一位同事的負面績效評估。你應該：", "options": ["A. 閱讀完並保留", "B. 立即刪除郵件並回覆發件人告知其誤發，不閱讀內容", "C. 轉發給其他同事", "D. 以此為把柄"], "answer": 1, "explanation": "B正確：涉及他人隱私的誤發郵件應立即刪除、不回看、通知發件人。A侵犯隱私；C/D違反職業道德。"}, {"module": 4, "question": "一名學生要求你提供另一位學生的成績排名，說是要申請交換計畫。你應該：", "options": ["A. 提供給他", "B. 請他通過正式申請管道（如教務處的成績申請表），學生個人資料受《個人資料保護法》保護，不能隨意提供", "C. 口頭告訴他大概的名次", "D. 「你要這個做什麼？」"], "answer": 1, "explanation": "B正確：學生個人成績排名屬於個人資料，必須依循正規申請流程。A/C違反資料保護法規；D缺乏專業指引。"}, {"module": 4, "question": "你負責的活動當天遇到紅色暴雨警告，所有戶外活動必須取消。但你的活動有一半在室內、一半在室外。你應該：", "options": ["A. 全部取消", "B. 「全部照常舉行，風雨無阻」", "C. 立即啟動應變計畫：室外環節改期或移至室內備用場地，室內環節照常，同時通知所有參加者最新安排", "D. 只取消戶外環節但不通知參加者"], "answer": 2, "explanation": "C正確：應變計畫包括調整方案（移師室內或改期）、確保安全、即時通知。A過度取消；B忽略安全風險；D溝通失誤。"}, {"module": 4, "question": "學院網站被發現有安全漏洞，可能有部分學生個資外洩。你得知消息後應立即：", "options": ["A. 評估後再決定是否上報", "B. 立即通知IT安全部門和數據保護主管，同時暫時關閉受影響的網站功能", "C. 發郵件給所有學生告知此事", "D. 假裝不知情"], "answer": 1, "explanation": "B是數據洩露應急響應的標準程序：立即通報專業單位、採取即時控制措施。A延誤處理；C在未確認情況前大規模通知可能引起恐慌；D逃避責任。"}, {"module": 4, "question": "你的辦公桌上同時有：1) 校長來電未接來電顯示；2) 下屬在門口焦急等候；3) 一封緊急郵件提示燈閃爍。你先處理哪一個？", "options": ["A. 先回校長電話", "B. 先處理下屬因為人在面前", "C. 先看郵件因為可以快速處理", "D. 快速判斷：先回校長電話（最高層級），同時請下屬稍等兩分鐘，郵件若標註緊急則查看是否需要立即行動"], "answer": 3, "explanation": "D是合理的優先級判斷：校長電話層級最高、時效性強；下屬在現場需要安撫；郵件可快速評估是否緊急。A-D單一選項都忽略了其他事務。"}, {"module": 4, "question": "你在協調一個與橫琴企業的合作項目時，企業方突然提出了一個合約中未涵蓋的新需求，且時間緊迫。你該如何回應？", "options": ["A. 「好，我們可以配合」", "B. 「不行，合約沒有寫」", "C. 表示理解需求，但說明需要先與校內法務和相關部門評估可行性及資源需求後才能回覆，並提出一個明確的回覆時間", "D. 「請你們找校長談」"], "answer": 2, "explanation": "C正確：既不完全拒絕也不貿然承諾，保留評估空間並設定回覆期限。A未經評估就承諾有風險；B過於僵硬影響合作關係；D推卸協調責任。"}, {"module": 4, "question": "你的主管經常在公開場合稱讚你的工作表現，但在績效評估時卻給了平庸的分數。你應如何處理？", "options": ["A. 默默接受", "B. 在社交媒體抱怨", "C. 預約與主管進行一對一績效反饋會議，以具體工作成果為依據，禮貌詢問評分標準和改進方向", "D. 直接找人事部門申訴"], "answer": 2, "explanation": "C是專業的職場溝通：以數據和事實為基礎、主動了解評分標準、尋求建設性的反饋。A委屈自己；B不專業；D跳級申訴應為最後手段。"}, {"module": 4, "question": "你的部門要承辦一個校級的大型頒獎典禮，你被指派為總協調。以下哪個步驟應該最先進行？", "options": ["A. 預訂場地", "B. 確定活動目標、規模和預算", "C. 設計邀請函", "D. 招募義工"], "answer": 1, "explanation": "B正確：活動規劃的首要步驟是釐清目標、規模和預算，這些決定了後續所有決策的方向。A、C、D都是有了B之後才能進行的步驟。"}, {"module": 4, "question": "你發現另一位同事在重要報告中抄襲了你的工作成果，但沒有提及你的貢獻。你應該：", "options": ["A. 在部門會議上公開指責", "B. 私下與該同事溝通，表明你注意到這個情況並感到不受尊重；如果無法解決，再向主管反映", "C. 下次你也抄他的", "D. 直接向學術倫理委員會檢舉"], "answer": 1, "explanation": "B是先內部解決的恰當方式：先溝通讓對方有機會解釋或道歉，保留升級處理的空間。A公開羞辱破壞關係；D直接檢舉可能過當；C以牙還牙不專業。"}, {"module": 4, "question": "在協助教授申請研究經費時，你發現預算表中有一項開支不太符合資助機構的規定。你應：", "options": ["A. 當作沒看到，教授說了算", "B. 直接修改", "C. 標註該項目並向教授說明疑慮，提供合規的替代方案供教授參考", "D. 寫郵件檢舉教授"], "answer": 2, "explanation": "C正確：提出問題和解決方案，尊重教授的最終決定權，同時盡到審核把關的責任。A失職；B越權修改；D反應過度。"}, {"module": 4, "question": "你接到一個陌生電話，對方自稱是某供應商，聲稱與校長有私交，要求你提供學校的員工名單和聯絡方式。你應：", "options": ["A. 直接提供", "B. 拒絕提供，說明個人資料不能隨意洩露，並建議對方通過正常採購管道聯繫", "C. 先打電話向校長求證", "D. 反問對方要多少錢"], "answer": 1, "explanation": "B正確：保護學校資料安全是最基本的行政原則，無論對方聲稱什麼關係。A洩露個資違法；C打擾校長求證不值得；D不專業且危險。"}, {"module": 4, "question": "你的辦公室要搬到新的校區，搬家過程中你發現一箱標示為「機密—銷毀」的文件被打開過。你應：", "options": ["A. 忽略，可能只是箱子破了", "B. 立即檢查箱內文件是否遺失，向上級報告此情況，並檢討搬遷過程中的保密流程", "C. 自己把文件拿去碎紙機處理", "D. 拍照發給同事問意見"], "answer": 1, "explanation": "B正確：機密文件保密失效必須上報，檢查實際損失並改進流程。A輕忽潛在的資料洩漏；C雖有補救但漏了上報；D不當傳播。"}, {"module": 4, "question": "你負責一個項目，預算執行率到年中時只有20%，但項目進度已達50%。你應該：", "options": ["A. 「很好，節省預算會得到表揚」", "B. 注意後半年可能預算不足或預算執行不力導致被削減，應檢視後半年開支計畫是否合理，必要時調整以確保全年預算有效運用", "C. 為了花錢而花錢", "D. 退回未使用的預算"], "answer": 1, "explanation": "B正確：預算執行率與進度不匹配是警示信號，應主動檢視和調整。A過於樂觀；C浪費公帑；D退回預算可能影響後續申請。"}, {"module": 4, "question": "在STAR面試中，當你被問到「請分享一個你處理過最困難的行政問題」，以下哪個回答結構最完整？", "options": ["A. 「我負責處理一個投訴，最後解決了」", "B. 「S：一位學生家長因宿舍糾紛寫了投訴信給校長。T：我需要在3天內提出調查報告和處理建議。A：我聯繫了宿舍管理員、輔導中心和相關學生，收集各方說法後匯總。R：報告在2天內完成，建議獲得採納，家長表示接受」", "C. 「我打了很多電話、寫了很多郵件，很辛苦」", "D. 「這個問題太難了，我沒有遇到過」"], "answer": 1, "explanation": "B是完整的STAR結構：Situation（背景）→ Task（任務）→ Action（行動）→ Result（結果），且具體量化（3天、2天內）。A過於簡略；C只有過程沒有結果；D迴避問題。"}];

var moduleLabels = ["深合區與澳大背景", "公文寫作與文法糾錯", "中英雙語互譯", "情境模擬與危機處理"];
var moduleColors = ["module1", "module2", "module3", "module4"];

var allIndices = quizData.map((_, i) => i);
var filteredIndices = [...allIndices];
var currentFilteredPos = 0;
var currentIndex = 0;
var selectedAnswers = new Array(quizData.length).fill(null);
var revealed = new Array(quizData.length).fill(false);
var correctCount = 0;

function renderProgress() {
  var bar = document.getElementById('progressBar');
  bar.innerHTML = '';
  filteredIndices.forEach(function(origIdx, pos) {
    var dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (pos === currentFilteredPos) dot.classList.add('current');
    if (revealed[origIdx]) {
      dot.classList.add(selectedAnswers[origIdx] === quizData[origIdx].answer ? 'correct' : 'wrong');
    } else if (selectedAnswers[origIdx] !== null) {
      dot.classList.add('answered');
    }
    dot.textContent = pos + 1;
    dot.addEventListener('click', function() { goToPosition(pos); });
    bar.appendChild(dot);
  });
}

function renderQuestion() {
  var q = quizData[currentIndex];
  var container = document.getElementById('quizContainer');
  container.innerHTML = '';
  
  var card = document.createElement('div');
  card.className = 'card active';

  var badge = document.createElement('span');
  badge.className = 'badge ' + moduleColors[q.module - 1];
  badge.textContent = '組' + q.module + '：' + moduleLabels[q.module - 1];
  card.appendChild(badge);

  var qNum = document.createElement('div');
  qNum.className = 'q-number';
  var totalInFilter = filteredIndices.length;
  qNum.textContent = '第 ' + (currentFilteredPos + 1) + ' / ' + totalInFilter + ' 題（總第 ' + (currentIndex + 1) + ' 題）';
  card.appendChild(qNum);

  var qText = document.createElement('div');
  qText.className = 'q-text';
  var qStr = q.question;
  qStr = qStr.replace(/\n/g, '<br>');
  qText.innerHTML = qStr;
  card.appendChild(qText);

  var optionsDiv = document.createElement('div');
  optionsDiv.className = 'options';

  var labels = ['A', 'B', 'C', 'D'];
  q.options.forEach(function(opt, i) {
    var div = document.createElement('div');
    div.className = 'option';
    div.textContent = labels[i] + '. ' + opt;
    
    if (revealed[currentIndex]) {
      div.classList.add('disabled');
      if (i === q.answer) div.classList.add('correct-reveal');
      else if (i === selectedAnswers[currentIndex] && i !== q.answer) div.classList.add('wrong-reveal');
    } else if (selectedAnswers[currentIndex] === i) {
      div.classList.add('selected');
    }
    
    div.addEventListener('click', function(idx) {
      return function() { selectOption(idx); };
    }(i));
    optionsDiv.appendChild(div);
  });
  card.appendChild(optionsDiv);

  var feedback = document.createElement('div');
  feedback.className = 'feedback';
  if (revealed[currentIndex]) {
    var isCorrect = selectedAnswers[currentIndex] === q.answer;
    feedback.classList.add('show', isCorrect ? 'correct' : 'wrong');
    feedback.innerHTML = isCorrect
      ? '<strong>✅ 正確！</strong>' + q.explanation
      : '<strong>❌ 正確答案是 ' + labels[q.answer] + '。</strong>' + q.explanation;
  }
  card.appendChild(feedback);
  container.appendChild(card);
  
  renderProgress();
  updateButtons();
  updateStats();
}

function selectOption(optionIndex) {
  if (revealed[currentIndex]) return;
  selectedAnswers[currentIndex] = optionIndex;
  renderQuestion();
}

function revealAnswer() {
  if (selectedAnswers[currentIndex] === null) return;
  revealed[currentIndex] = true;
  if (selectedAnswers[currentIndex] === quizData[currentIndex].answer) {
    correctCount++;
  }
  renderQuestion();
}

function goToPosition(pos) {
  currentFilteredPos = pos;
  currentIndex = filteredIndices[pos];
  renderQuestion();
}

function prevQuestion() {
  if (currentFilteredPos > 0) {
    currentFilteredPos--;
    currentIndex = filteredIndices[currentFilteredPos];
    renderQuestion();
  }
}

function nextQuestion() {
  if (selectedAnswers[currentIndex] === null) return;
  if (!revealed[currentIndex]) { revealAnswer(); return; }
  if (currentFilteredPos < filteredIndices.length - 1) {
    currentFilteredPos++;
    currentIndex = filteredIndices[currentFilteredPos];
    renderQuestion();
  }
}

function updateButtons() {
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  prevBtn.disabled = currentFilteredPos === 0;
  if (selectedAnswers[currentIndex] === null) {
    nextBtn.textContent = '先選擇答案 ▶';
    nextBtn.className = 'nav-btn locked';
  } else if (!revealed[currentIndex]) {
    nextBtn.textContent = '✅ 查看答案';
    nextBtn.className = 'nav-btn next';
  } else if (currentFilteredPos < filteredIndices.length - 1) {
    nextBtn.textContent = '下一題 ▶';
    nextBtn.className = 'nav-btn next';
  } else {
    nextBtn.textContent = '🎉 完成！';
    nextBtn.className = 'nav-btn next';
  }
}

function updateStats() {
  var answered = 0;
  filteredIndices.forEach(function(idx) { if (selectedAnswers[idx] !== null) answered++; });
  var totalInFilter = filteredIndices.length;
  var wrongCount = selectedAnswers.filter(function(a,i){return a !== null && revealed[i] && a !== quizData[i].answer}).length;
  document.getElementById('statsDisplay').innerHTML =
    '已完成 ' + answered + ' / ' + totalInFilter + ' 題（篩選範圍）<br>' +
    '✅ 正確 ' + correctCount + ' 題 · ❌ 錯誤 ' + wrongCount + ' 題';
}

function resetQuiz() {
  if (!confirm('確定重新開始？所有進度將被清除。')) return;
  selectedAnswers = new Array(quizData.length).fill(null);
  revealed = new Array(quizData.length).fill(false);
  correctCount = 0;
  currentFilteredPos = 0;
  currentIndex = filteredIndices[0];
  renderQuestion();
}

function randomQuestion() {
  var idx = Math.floor(Math.random() * filteredIndices.length);
  goToPosition(idx);
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    var filter = this.getAttribute('data-filter');
    filteredIndices = filter === 'all' ? [...allIndices] : allIndices.filter(function(i) { return quizData[i].module === parseInt(filter); });
    currentFilteredPos = 0;
    currentIndex = filteredIndices[0];
    renderQuestion();
  });
});

document.getElementById('prevBtn').addEventListener('click', prevQuestion);
document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('resetBtn').addEventListener('click', resetQuiz);
document.getElementById('randomBtn').addEventListener('click', randomQuestion);

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextQuestion(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); prevQuestion(); }
  else if (e.key >= '1' && e.key <= '4') {
    var idx = parseInt(e.key) - 1;
    if (idx < quizData[currentIndex].options.length) selectOption(idx);
  }
});

currentIndex = filteredIndices[0];
renderQuestion();
</script>
</body>
</html>
